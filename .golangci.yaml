linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: false

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - staticcheck
    - linters:
        - errcheck
      text: "Error return value of `.*` is not checked"
      path-not: "_test\\.go"
    - linters:
        - staticcheck
      text: "SA1029"
