http:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30
  write_timeout: 30
  idle_timeout: 60

logger:
  level: "info"
  output: "console"
  format: "console"
  file_path: "./logs/app.log"

database:
  driver: "sqlite"
  host: "localhost"
  port: 5432
  user: "postgres"
  password: ""
  db_name: "app.db"
  ssl_mode: "disable"
  charset: "utf8mb4"
  timezone: "UTC"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 300
  conn_max_idle_time: 60
  log_level: "silent"
  custom_logger: true

cache:
  driver: "memory"
  redis_addr: "localhost:6379"
  redis_password: ""
  redis_db: 0
  file_path: "./cache"
  ttl: 300
  cleanup_interval: 60

cron:
  timezone: "UTC"
  max_jobs: 100
  recover_pan: true

websocket:
  read_buffer_size: 1024
  write_buffer_size: 1024
  ping_interval: 30
  pong_timeout: 10
  max_message_size: 4096
  allowed_origins:
    - "*"

graceful:
  timeout: 30